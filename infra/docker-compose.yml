services:
  # DB
  db-postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rpi-sweet-home
      POSTGRES_USER: rpi-sweet-home
      POSTGRES_PASSWORD: admin1234!
    ports:
      - "15432:5432"
    networks:
      - sweet-home-network

  # DB ADMIN GUI
  db-postgres-adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "18085:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db-postgres
    networks:
      - sweet-home-network

networks:
  sweet-home-network: